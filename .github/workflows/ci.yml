name: ci

# Lint, type-check, and test on every push to main and every PR. Installs the
# torch extra so the torch-handoff tests run here (they skip locally when torch
# is absent).
on:
  push:
    branches: [main]
  pull_request: {}

permissions:
  contents: read

# Cancel superseded runs so a hung run can't pin a runner for hours.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15  # a hang fails fast instead of burning the 6h default
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
      - run: uv sync --extra torch --extra bench
      - run: uv run ruff check src tests bench examples
      - run: uv run ruff format --check src tests bench examples
      - run: uv run mypy src
      - run: uv run pytest -q
